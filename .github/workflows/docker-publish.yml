name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.sha-tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build jar
        run: mvn clean package -q

      - id: meta
        run: echo "sha-tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            mwesterham/tf2-ingest-flink-job:latest
            mwesterham/tf2-ingest-flink-job:${{ steps.meta.outputs.sha-tag }}

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
        with:
          repository: mwesterham/k8s-mwesterham-homelab
          path: k8s

      - name: Update image tag and apply
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          sed -i "s|image: \"mwesterham/tf2-ingest-flink-job:.*\"|image: \"mwesterham/tf2-ingest-flink-job:${IMAGE_TAG}\"|" \
            k8s/configuration/services/tf2autobot/tf2-ingest/tf2-ingest-flink.yaml
          kubectl apply -f k8s/configuration/services/tf2autobot/tf2-ingest/tf2-ingest-flink.yaml
